<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoices | SampraDayam Events</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="invoice.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
</head>
<body class="invoice-app-body">
  <nav class="navbar">
    <div class="container">
      <div class="nav-wrapper">
        <a href="index.html" class="logo">
          <img src="sdLogoBlack.jpeg" alt="SampraDayam Events Logo" class="logo-icon">
          <div class="logo-main">
            <span class="logo-text"><span class="logo-letter-large">S</span>AMPRA<span class="logo-letter-large">D</span>AYAM EVENTS</span>
            <span class="logo-tagline">Every Celebration is Memory</span>
          </div>
        </a>
        <button class="mobile-menu-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
        <ul class="nav-menu">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="services.html" class="nav-link">Services</a></li>
          <li><a href="gallery.html" class="nav-link">Gallery</a></li>
          <li><a href="about.html" class="nav-link">About</a></li>
          <li><a href="contact.html" class="nav-link">Contact</a></li>
          <li><a href="admin-dashboard.html" class="nav-link">Admin</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="invoice-app-main">
    <div class="invoice-card">
      <div class="invoice-toolbar no-print">
        <h1 style="margin:0; flex:1; font-family:'Playfair Display',serif; color:var(--primary-color);">Saved invoices</h1>
        <a class="btn btn-outline" href="admin-dashboard.html">Admin home</a>
        <a class="btn btn-outline" href="invoice-catalog.html">Items list</a>
        <a class="btn btn-primary" href="invoice-edit.html">New invoice</a>
        <button type="button" class="btn btn-outline" id="invoiceLogout">Sign out</button>
      </div>

      <div class="form-row no-print" style="margin-bottom:1rem;">
        <label for="invoiceFilter" class="invoice-muted" style="display:inline; margin-right:0.5rem;">Show</label>
        <select id="invoiceFilter">
          <option value="all">All</option>
          <option value="draft">Drafts</option>
          <option value="completed">Completed</option>
        </select>
      </div>

      <p id="invoiceListEmpty" class="invoice-muted" hidden>No invoices yet. Create one with “New invoice”.</p>

      <div class="invoice-table-wrap">
        <table class="invoice-list-table">
          <thead>
            <tr>
              <th>Status</th>
              <th>Invoice #</th>
              <th>Bill to</th>
              <th>Date</th>
              <th>Total</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="invoiceList"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script type="module" src="js/invoice-admin.js"></script>
  <script src="script.js"></script>
</body>
</html>
