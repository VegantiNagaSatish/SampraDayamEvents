<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Sign in | SampraDayam Events</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
</head>
<body class="invoice-app-body">
  <nav class="navbar">
    <div class="container">
      <div class="nav-wrapper">
        <a href="index.html" class="logo">
          <img src="sdLogoBlack.jpeg" alt="SampraDayam Events Logo" class="logo-icon">
          <div class="logo-main">
            <span class="logo-text"><span class="logo-letter-large">S</span>AMPRA<span class="logo-letter-large">D</span>AYAM EVENTS</span>
            <span class="logo-tagline">Every Celebration is Memory</span>
          </div>
        </a>
        <button class="mobile-menu-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
        <ul class="nav-menu">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="services.html" class="nav-link">Services</a></li>
          <li><a href="gallery.html" class="nav-link">Gallery</a></li>
          <li><a href="about.html" class="nav-link">About</a></li>
          <li><a href="contact.html" class="nav-link">Contact</a></li>
          <li><a href="admin-login.html" class="nav-link active">Admin</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="invoice-app-main">
    <div class="invoice-card">
      <h1>Admin sign in</h1>
      <p class="invoice-muted">Sign in with your admin phone number and password. Configure Firebase first — see <code>invoice_requirement.md</code> §11.</p>

      <div id="adminLoginError" class="invoice-alert" hidden></div>

      <form id="adminLoginForm" class="invoice-form">
        <div class="form-row">
          <label for="adminPhone">Phone (10 digits)</label>
          <input type="text" id="adminPhone" name="phone" inputmode="numeric" autocomplete="username" maxlength="15" placeholder="10-digit mobile" required>
        </div>
        <div class="form-row">
          <label for="adminPassword">Password</label>
          <input type="password" id="adminPassword" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary">Sign in</button>
      </form>
    </div>
  </main>

  <script type="module" src="js/admin-login.js"></script>
  <script src="script.js"></script>
</body>
</html>
