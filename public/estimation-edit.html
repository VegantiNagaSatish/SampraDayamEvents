<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit estimation | SampraDayam Events</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@600;700&family=Poppins:wght@400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
</head>
<body class="invoice-app-body">
  <nav class="navbar">
    <div class="container">
      <div class="nav-wrapper">
        <a href="index.html" class="logo">
          <img src="sdLogoBlack.jpeg" alt="SampraDayam Events Logo" class="logo-icon">
          <div class="logo-main">
            <span class="logo-text"><span class="logo-letter-large">S</span>AMPRA<span class="logo-letter-large">D</span>AYAM EVENTS</span>
            <span class="logo-tagline">Every Celebration is Memory</span>
          </div>
        </a>
        <button class="mobile-menu-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
        <ul class="nav-menu">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="services.html" class="nav-link">Services</a></li>
          <li><a href="gallery.html" class="nav-link">Gallery</a></li>
          <li><a href="about.html" class="nav-link">About</a></li>
          <li><a href="contact.html" class="nav-link">Contact</a></li>
          <li><a href="admin-dashboard.html" class="nav-link">Admin</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="invoice-app-main">
    <div class="invoice-card">
      <header class="invoice-letterhead invoice-letterhead--estimation" aria-label="Business letterhead">
        <img src="sdLogo.jpeg" alt="" class="invoice-letterhead__logo" width="180" height="180">
        <div class="invoice-letterhead__center">
          <div id="printSellerName" class="invoice-letterhead__name"></div>
          <div id="printSellerPhones" class="invoice-letterhead__phones"></div>
          <div id="printSellerEmail" class="invoice-letterhead__email"></div>
        </div>
        <div class="invoice-letterhead__right">
          <div class="invoice-letterhead__doc-stack">
            <div class="invoice-letterhead__doc-kicker">ESTIMATION</div>
          </div>
        </div>
      </header>

      <section class="invoice-doc invoice-doc--masthead" aria-label="Estimation details">
        <div class="invoice-doc__meta">
          <div>
            <strong>Bill to</strong><br>
            <span id="previewBillTo">—</span>
          </div>
          <div>
            <strong>Invoice #</strong> <span id="invoicePreviewNum">—</span><br>
            <strong>Date</strong> <span id="previewDate">—</span>
          </div>
        </div>
      </section>

      <div class="invoice-toolbar invoice-toolbar--compact no-print">
        <a class="btn btn-outline btn--toolbar" href="admin-dashboard.html">Admin home</a>
        <a class="btn btn-outline btn--toolbar" href="estimations.html">Estimations</a>
        <a class="btn btn-outline btn--toolbar" href="catalog.html">Catalog</a>
        <button type="button" class="btn btn-primary btn--toolbar" id="saveDraftBtn">Save draft</button>
        <button type="button" class="btn btn-outline btn--toolbar" id="completeInvoiceBtn">Mark complete</button>
        <button type="button" class="btn btn-outline btn--toolbar" id="printInvoiceBtn" hidden>Print</button>
        <button type="button" class="btn btn-outline btn--toolbar" id="invoiceShareWhatsappBtn" hidden>Share</button>
      </div>

      <div id="invoiceFormError" class="invoice-alert" hidden></div>

      <div class="invoice-form no-print">
        <div class="form-row">
          <label for="billToName">Bill to</label>
          <input type="text" id="billToName" placeholder="Customer name" style="max-width:480px;">
        </div>
        <div class="form-row">
          <label for="invoiceDate">Estimation date</label>
          <input type="date" id="invoiceDate">
        </div>
      </div>

      <div class="invoice-toolbar invoice-toolbar--compact no-print">
        <button type="button" class="btn btn-outline btn--toolbar" id="addLineBtn">Add line</button>
      </div>

      <div class="invoice-table-wrap invoice-lines-scroll">
        <table class="invoice-lines-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Item</th>
              <th>Qty</th>
              <th>Price (₹)</th>
              <th>Amount</th>
              <th class="no-print"></th>
            </tr>
          </thead>
          <tbody id="lineItemsBody"></tbody>
        </table>
      </div>

      <section class="invoice-doc invoice-doc--footer" aria-label="Estimation totals">
        <div class="invoice-doc__totals">
          <div><strong>Total</strong><strong id="previewGrand">₹0.00</strong></div>
        </div>
        <p class="invoice-doc__words"><strong>Amount in words:</strong> <span id="previewAmountWords">Zero Rupees Only</span></p>
        <p class="invoice-doc__sign">For, <span id="printSignFor"></span><br><strong>Authorized signature</strong></p>
      </section>
    </div>
  </main>

  <script type="module" src="js/estimation-edit.js"></script>
  <script src="script.js"></script>
</body>
</html>
